---
layout: default
---
<article class="container container--reading">
  <header class="page-header">
    <a class="eyebrow page-header__eyebrow" href="{{ '/blog/' | relative_url }}">← Writing</a>
    <h1 class="page-header__title">{{ page.title }}</h1>
    {%- if page.description or page.excerpt %}
      <p class="lede page-header__lede">{{ page.description | default: page.excerpt | strip_html | truncate: 220 }}</p>
    {%- endif %}
    {%- include post-meta.html post=page -%}
  </header>

  <div class="prose">
    {{ content }}
  </div>

  <nav class="page-header" style="border-top: 1px solid; border-bottom: 0; padding-top: 32px; margin-top: 64px;">
    <a class="btn btn--ghost" href="{{ '/blog/' | relative_url }}"><span class="btn__arrow">←</span> All writing</a>
  </nav>
</article>
