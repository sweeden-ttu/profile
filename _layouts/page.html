---
layout: default
---
<article class="container container--reading">
  {%- if page.title %}
  <header class="page-header">
    {%- if page.eyebrow %}<span class="eyebrow page-header__eyebrow">{{ page.eyebrow }}</span>{% endif %}
    <h1 class="page-header__title">{{ page.title }}</h1>
    {%- if page.description %}<p class="lede page-header__lede">{{ page.description }}</p>{% endif %}
  </header>
  {%- endif %}

  <div class="prose">
    {{ content }}
  </div>
</article>
