---
layout: default
---

<div class="site-frame surface-page">
  {% if page.surface_kicker %}
    <p class="surface-page__kicker" data-reveal>{{ page.surface_kicker }}</p>
  {% endif %}
  <article class="page">
    <header class="page__header">
      <h1 class="page__title">{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page__subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>

    <div class="page__content">
      {{ content }}
    </div>
  </article>
</div>
