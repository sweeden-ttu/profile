---
layout: default
---
<article class="container container--reading">
  <header class="page-header">
    <a class="eyebrow page-header__eyebrow" href="{{ '/projects/' | relative_url }}">← Projects</a>
    <h1 class="page-header__title">{{ page.title }}</h1>
    {%- if page.description %}<p class="lede page-header__lede">{{ page.description }}</p>{% endif %}
    {%- if page.tags and page.tags.size > 0 %}
    <div class="page-header__meta">
      <span class="page-header__meta-item" style="gap: 6px;">
        {%- for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor -%}
      </span>
    </div>
    {%- endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
