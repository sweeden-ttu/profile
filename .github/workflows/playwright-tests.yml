# GitHub Actions workflow for Playwright UI and Link Validation Tests
# Runs UI validation, backwards link checking, and visual regression tests

name: Playwright Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - stable

  push:
    branches:
      - main
      - master
      - stable

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================
      # Build Jekyll Site
      # ============================================
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Jekyll dependencies
        run: |
          gem install bundler
          bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # ============================================
      # Setup Playwright
      # ============================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      # ============================================
      # Run Tests (Playwright manages Jekyll server via webServer config)
      # ============================================
      - name: Run Playwright Tests
        run: npx playwright test --project=chromium
        env:
          CI: true

      # ============================================
      # Upload Results
      # ============================================
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

      - name: Post test results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let report = '## 🎭 Playwright Test Results\n\n';

            // Check if tests passed or failed
            const exitCode = process.env.PLAYWRIGHT_EXIT_CODE || '0';

            if (exitCode === '0') {
              report += '✅ All UI validation and link checker tests passed!\n\n';
            } else {
              report += '❌ Some tests failed. Check the artifacts for details.\n\n';
            }

            report += '### Tests Run\n\n';
            report += '- **UI Validation**: Visual design, layout, interactive elements\n';
            report += '- **Backwards Link Checker**: Verifies all content files are linked\n';
            report += '- **Accessibility**: A11y compliance checks\n';
            report += '- **Performance**: CLS, load times, optimization\n\n';
            report += '📊 [View full report in workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # Separate job for mobile/tablet testing
  mobile-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: playwright-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build Jekyll site
        run: |
          bundle install
          bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Playwright
        run: |
          npm ci || npm install
          npx playwright install --with-deps webkit

      - name: Run Mobile/Tablet Tests
        run: npx playwright test --project=mobile --project=tablet
        env:
          CI: true
        continue-on-error: true

      - name: Upload Mobile Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mobile-report
          path: playwright-report/
          retention-days: 30
