name: Release Jekyll Site

on:
  push:
    branches: [main, stable]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright dependencies
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: Validate HTML
        run: bundle exec htmlproofer ./_site --disable-external

      - name: Run Playwright tests
        run: npx playwright test

      - name: Package site artifact
        run: |
          VERSION=$(date -u "+%Y.%m.%d.%H%M%S")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          zip -r "site-${VERSION}.zip" _site

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Automated release from CI on ${{ github.ref }} after passing build, html-proofer, and Playwright tests.
          files: |
            site-${{ env.VERSION }}.zip
