# GitHub Actions workflow for AI code review using Claude (Anthropic)
# Reviews code quality, best practices, and provides intelligent feedback

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - stable

  # Allow @claude mentions in PR comments
  issue_comment:
    types: [created]

  pull_request_review_comment:
    types: [created]

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Run on PR events, or when someone mentions @claude in a comment
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Custom instructions for the review
          claude_args: |
            --max-turns 3
            --system-prompt "You are reviewing a Jekyll static site for an academic portfolio. Focus on:
            1. Code quality and best practices
            2. Jekyll/Liquid template correctness
            3. Markdown formatting and structure
            4. Front matter validation (YAML)
            5. Security issues (exposed secrets, unsafe patterns)
            6. Accessibility concerns in HTML/templates
            7. Performance optimizations
            
            Be concise and actionable. Prioritize critical issues over style nitpicks.
            Reference the CLAUDE.md file for project-specific conventions."
