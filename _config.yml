# Site Settings
title: Scott Weeden
description: Making technology accessible — Master of Computer Applications (MCA), Computer Science, Texas Tech University (March 2025).
url: "https://scottweeden.online"
baseurl: ""

# Author Information
author:
  name: Scott Weeden
  email: scott.weeden@gmail.com
  github: sweeden-ttu
  linkedin: weedens

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
timezone: America/Chicago

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  courses:
    output: true
    permalink: /courses/:name/
  assignments:
    output: true
    permalink: /assignments/:path/
  faculty:
    output: true
    permalink: /faculty/:name/
  lectures:
    output: false
  drafts:
    output: false

# Kramdown Settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
    css_class: 'highlight'
  math_engine: katex

# Plugins
# jekyll-sitemap → outputs /sitemap.xml (absolute URLs via url + baseurl)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Feed Settings
feed:
  path: /feed.xml

# SEO Settings
logo: /assets/images/logo.png
social:
  name: Scott Weeden
  links:
    - https://github.com/sweeden-ttu
    - https://linkedin.com/in/weedens

# Defaults
defaults:
  # Posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      author: Scott Weeden
  # Projects
  - scope:
      path: "_projects"
      type: projects
    values:
      layout: project
  # Courses
  - scope:
      path: "_courses"
      type: courses
    values:
      layout: page
  # Faculty
  - scope:
      path: "_faculty"
      type: faculty
    values:
      layout: page
  # Assignments
  - scope:
      path: "_assignments"
      type: assignments
    values:
      layout: project
  # Drafts
  - scope:
      path: "_drafts"
      type: drafts
    values:
      layout: post
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Exclude from processing (also prevents *_solutions.md.backup from matching as Markdown)
exclude:
  - "**/*.md.backup"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - CLAUDE.md
  - README.md
  - templates/
  - .lighthouserc.json
  - package.json
  - package-lock.json

# Include files
include:
  - _pages

# Sass/SCSS Settings
sass:
  sass_dir: _sass
  style: compressed

# Pagination (if needed in future)
# paginate: 10
# paginate_path: "/blog/page:num/"
