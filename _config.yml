theme: null

# Site Settings
title: Scott Weeden
description: Master of Computer Science student at Texas Tech University. Notes on cryptography, formal verification, machine learning.
url: "https://scottweeden.online"
baseurl: ""
lang: en
timezone: America/Chicago

# Author Information
author:
  type: person
  name: Scott Weeden
  email: scott.weeden@gmail.com
  github: sweeden-ttu
  linkedin: weedens
  facebook: scotdwg81
  instagram: websharps

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  courses:
    output: true
    permalink: /courses/:name/
  assignments:
    output: true
    permalink: /assignments/:path/
  faculty:
    output: true
    permalink: /faculty/:name/
  lectures:
    output: false
  drafts:
    output: false

# Kramdown Settings (math: kramdown-math-katex gem + katex Ruby gem; keep CDN KaTeX in _includes/katex-*.html aligned with gem’s Katex::KATEX_VERSION)
#
# Math in Markdown:
# - $$ … $$ on its own lines → block math, rendered at build time via kramdown-math-katex.
# - $$ … $$ on one line → inline math at build time (kramdown convention).
# - $ … $, \( … \), \[ … \] → not parsed by kramdown; KaTeX auto-render runs in the browser on all pages using default.html.
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
    css_class: 'highlight'
  math_engine: katex
  math_engine_opts:
    throw_on_error: false
    strict: "ignore"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

# Feed Settings
feed:
  path: /feed.xml

# SEO Settings
logo: /assets/images/logo.png
social:
  name: Scott Weeden
  links:
    - https://github.com/sweeden-ttu
    - https://www.linkedin.com/in/weedens/
    - https://www.facebook.com/scotdwg81
    - https://www.instagram.com/websharps/

# Defaults
defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      author: Scott Weeden
  - scope:
      path: "_projects"
      type: projects
    values:
      layout: project
  - scope:
      path: "_courses"
      type: courses
    values:
      layout: page
  - scope:
      path: "_faculty"
      type: faculty
    values:
      layout: page
  - scope:
      path: "_assignments"
      type: assignments
    values:
      layout: project
  - scope:
      path: "_drafts"
      type: drafts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# Exclude from processing (also prevents *_solutions.md.backup from matching as Markdown)
exclude:
  - "**/*.md.backup"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs
  - CLAUDE.md
  - README.md
  - templates/
  - .lighthouserc.json
  - package.json
  - package-lock.json
  - coursework
  - courses
  - _theme
  - "**/*.archive"

# Include files
include:
  - _pages

# Sass/SCSS Settings
sass:
  sass_dir: _sass
  style: compressed

# Pagination (if needed in future)
# paginate: 10
# paginate_path: "/blog/page:num/"
