# TeXt Theme Configuration (using local submodule)
theme: null
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jemoji
  - jekyll-seo-tag

# Site Settings
title: Scott Weeden
description: Computer Science student, researcher, and ML enthusiast at Texas Tech University
url: "https://scottweeden.online"
baseurl: ""

# TeXt Theme Settings
text_skin: default
highlight_theme: tomorrow-night
lang: en
timezone: America/Chicago

# Author Information
author:
  type: person
  name: Scott Weeden
  url: https://scottweeden.online
  avatar: /assets/images/logo.png
  bio: Master's student at Texas Tech University exploring machine learning, cryptography, and software verification.
  email: sweeden@ttu.edu
  github: sweeden-ttu
  linkedin: weedens

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  courses:
    output: true
    permalink: /courses/:name/
  assignments:
    output: true
    permalink: /assignments/:path/
  faculty:
    output: true
    permalink: /faculty/:name/
  lectures:
    output: false
  drafts:
    output: false

# Kramdown Settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
    css_class: 'highlight'
  math_engine: katex

# TeXt Theme - Markdown Enhancements
mathjax: false  # Using KaTeX instead
katex: true
katex_autoNumber: true
mermaid: true
chart: true

# TeXt Theme - Post Settings
excerpt_separator: <!--more-->
license: false
toc:
  selectors: "h1,h2,h3"

# TeXt Theme - Pagination
paginate: 8
paginate_path: /page:num

# TeXt Theme - Paths
paths:
  root: /
  home: /
  archive: /archive.html
  rss: /feed.xml

# TeXt Theme - Repository
repository: sweeden-ttu/profile
repository_tree: stable

# Feed Settings
feed:
  path: /feed.xml

# SEO Settings
logo: /assets/images/logo.png
social:
  name: Scott Weeden
  links:
    - https://github.com/sweeden-ttu
    - https://linkedin.com/in/weedens

# Defaults
defaults:
  # Posts (TeXt theme uses 'article' layout)
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: article
      author: Scott Weeden
      sharing: true
      license: false
      aside:
        toc: true
      show_edit_on_github: true
      show_subscribe: true
      pageview: false
  # Projects
  - scope:
      path: "_projects"
      type: projects
    values:
      layout: project
  # Courses
  - scope:
      path: "_courses"
      type: courses
    values:
      layout: page
  # Faculty
  - scope:
      path: "_faculty"
      type: faculty
    values:
      layout: page
  # Assignments
  - scope:
      path: "_assignments"
      type: assignments
    values:
      layout: project
  # Drafts
  - scope:
      path: "_drafts"
      type: drafts
    values:
      layout: post
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  # Home page uses landing layout
  - scope:
      path: "index.html"
    values:
      layout: landing

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - docs
  - CLAUDE.md
  - README.md
  - templates/
  - .lighthouserc.json
  - package.json
  - package-lock.json
  - coursework
  - courses
  - _theme

# Include files
include:
  - _pages

# Sass/SCSS Settings (TeXt theme)
sass:
  sass_dir: _sass_text
  style: compressed

# Pagination (if needed in future)
# paginate: 10
# paginate_path: "/blog/page:num/"
