<!-- Theme Switcher Component -->
<!-- Allows users to switch between light, dark, and system-preferred themes -->

<style>
  .theme-switcher {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
  }
  
  .theme-switcher-btn {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-gray-100);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-md);
    color: var(--color-gray-700);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: var(--transition-all) var(--transition-normal);
  }
  
  .theme-switcher-btn:hover {
    background: var(--color-gray-200);
    border-color: var(--color-gray-300);
  }
  
  .theme-switcher-btn .theme-icon {
    width: 18px;
    height: 18px;
    transition: var(--transition-transform) var(--transition-normal);
  }
  
  .theme-switcher-btn:hover .theme-icon {
    transform: rotate(15deg);
  }
  
  .theme-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: var(--space-2);
    background: var(--color-white);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: var(--transition-all) var(--transition-normal);
    z-index: 1000;
    min-width: 180px;
    overflow: hidden;
  }
  
  .theme-dropdown.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  
  .theme-option {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: transparent;
    border: none;
    color: var(--color-gray-700);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: var(--transition-colors) var(--transition-normal);
    text-align: left;
  }
  
  .theme-option:hover {
    background: var(--color-gray-50);
    color: var(--color-primary);
  }
  
  .theme-option.active {
    background: var(--color-primary-light);
    color: var(--color-primary-dark);
  }
  
  .theme-option .option-icon {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .theme-option .option-icon svg {
    width: 16px;
    height: 16px;
  }
  
  .theme-divider {
    height: 1px;
    background: var(--color-gray-200);
    margin: var(--space-2) 0;
  }
  
  .theme-label {
    font-size: var(--font-size-xs);
    color: var(--color-gray-500);
    padding: var(--space-2) var(--space-4);
    text-transform: uppercase;
    letter-spacing: var(--letter-spacing-wide);
  }
  
  /* Font size switcher */
  .font-size-switcher {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-gray-100);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-md);
    margin-left: var(--space-2);
  }
  
  .font-size-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: transparent;
    border: none;
    color: var(--color-gray-600);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: var(--transition-all) var(--transition-normal);
  }
  
  .font-size-btn:hover {
    background: var(--color-gray-200);
    color: var(--color-gray-800);
  }
  
  .font-size-btn.active {
    background: var(--color-primary);
    color: var(--color-white);
  }
  
  .font-size-indicator {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-size-xs);
    font-weight: var(--font-weight-bold);
  }
  
  /* Accessibility toggle */
  .accessibility-toggle {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-gray-100);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-md);
    margin-left: var(--space-2);
    cursor: pointer;
    transition: var(--transition-all) var(--transition-normal);
  }
  
  .accessibility-toggle:hover {
    background: var(--color-gray-200);
  }
  
  .accessibility-toggle.active {
    background: var(--color-warning);
    border-color: var(--color-warning);
    color: var(--color-white);
  }
  
  /* High contrast mode */
  .high-contrast-toggle {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background: var(--color-gray-100);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-md);
    margin-left: var(--space-2);
    cursor: pointer;
    transition: var(--transition-all) var(--transition-normal);
  }
  
  .high-contrast-toggle:hover {
    background: var(--color-gray-200);
  }
  
  .high-contrast-toggle.active {
    background: var(--color-secondary);
    border-color: var(--color-secondary);
    color: var(--color-white);
  }
  
  @media (max-width: 768px) {
    .font-size-switcher,
    .accessibility-toggle,
    .high-contrast-toggle {
      display: none;
    }
  }
</style>

<div class="theme-switcher" id="theme-switcher">
  <button class="theme-switcher-btn" id="theme-toggle-btn" aria-label="Toggle theme menu" aria-expanded="false">
    <svg class="theme-icon" id="current-theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <span id="current-theme-label">Light</span>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </button>
  
  <div class="theme-dropdown" id="theme-dropdown" role="menu">
    <div class="theme-label">Theme</div>
    
    <button class="theme-option active" data-theme="light" role="menuitem">
      <span class="option-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
        </svg>
      </span>
      Light
    </button>
    
    <button class="theme-option" data-theme="dark" role="menuitem">
      <span class="option-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </span>
      Dark
    </button>
    
    <button class="theme-option" data-theme="system" role="menuitem">
      <span class="option-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
          <line x1="8" y1="21" x2="16" y2="21"></line>
          <line x1="12" y1="17" x2="12" y2="21"></line>
        </svg>
      </span>
      System
    </button>
    
    <div class="theme-divider"></div>
    <div class="theme-label">Accessibility</div>
    
    <button class="theme-option" data-theme="high-contrast" role="menuitem">
      <span class="option-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 2a10 10 0 0 1 0 20"></path>
          <path d="M12 2v20"></path>
          <path d="M2 12h20"></path>
        </svg>
      </span>
      High Contrast
    </button>
    
    <button class="theme-option" data-theme="large-text" role="menuitem">
      <span class="option-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
      </span>
      Large Text
    </button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const themeSwitcher = document.getElementById('theme-switcher');
  const toggleBtn = document.getElementById('theme-toggle-btn');
  const dropdown = document.getElementById('theme-dropdown');
  const themeLabel = document.getElementById('current-theme-label');
  const themeIcon = document.getElementById('current-theme-icon');
  const options = dropdown.querySelectorAll('.theme-option');
  
  // Theme icons
  const icons = {
    light: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>`,
    dark: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>`,
    system: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
      <line x1="8" y1="21" x2="16" y2="21"></line>
      <line x1="12" y1="17" x2="12" y2="21"></line>
    </svg>`
  };
  
  // Get current theme from localStorage or system preference
  function getCurrentTheme() {
    return localStorage.getItem('theme') || 'system';
  }
  
  // Apply theme to document
  function applyTheme(theme) {
    const html = document.documentElement;
    const body = document.body;
    
    // Remove all theme classes
    html.classList.remove('theme-dark', 'theme-light', 'theme-system', 'theme-high-contrast', 'theme-large-text');
    
    // Store selected theme
    localStorage.setItem('theme', theme);
    
    // Apply new theme
    if (theme === 'system') {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        html.classList.add('theme-dark');
        updateUI('dark');
      } else {
        html.classList.add('theme-light');
        updateUI('light');
      }
    } else if (theme === 'high-contrast') {
      html.classList.add('theme-high-contrast');
      updateUI('high-contrast');
    } else if (theme === 'large-text') {
      html.classList.add('theme-large-text');
      body.style.fontSize = '125%';
      updateUI('large-text');
    } else {
      html.classList.add(`theme-${theme}`);
      updateUI(theme);
    }
    
    // Update Chart.js colors if available
    if (typeof updateChartColors === 'function') {
      setTimeout(updateChartColors, 100);
    }
  }
  
  // Update UI to reflect current theme
  function updateUI(theme) {
    const labels = {
      light: 'Light',
      dark: 'Dark',
      system: 'System',
      high-contrast: 'High Contrast',
      'large-text': 'Large Text'
    };
    
    themeLabel.textContent = labels[theme] || 'Theme';
    
    if (icons[theme]) {
      themeIcon.innerHTML = icons[theme];
    }
    
    // Update active state
    options.forEach(option => {
      option.classList.toggle('active', option.dataset.theme === theme);
    });
  }
  
  // Toggle dropdown
  toggleBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    const isExpanded = toggleBtn.getAttribute('aria-expanded') === 'true';
    toggleBtn.setAttribute('aria-expanded', !isExpanded);
    dropdown.classList.toggle('show');
  });
  
  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!themeSwitcher.contains(e.target)) {
      dropdown.classList.remove('show');
      toggleBtn.setAttribute('aria-expanded', 'false');
    }
  });
  
  // Handle theme selection
  options.forEach(option => {
    option.addEventListener('click', function() {
      const theme = this.dataset.theme;
      
      // Reset body font size if not large text
      if (theme !== 'large-text') {
        document.body.style.fontSize = '';
      }
      
      applyTheme(theme);
      dropdown.classList.remove('show');
      toggleBtn.setAttribute('aria-expanded', 'false');
    });
  });
  
  // Handle system theme changes
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (getCurrentTheme() === 'system') {
      const prefersDark = this.matches;
      if (prefersDark) {
        document.documentElement.classList.remove('theme-light');
        document.documentElement.classList.add('theme-dark');
        updateUI('dark');
      } else {
        document.documentElement.classList.remove('theme-dark');
        document.documentElement.classList.add('theme-light');
        updateUI('light');
      }
    }
  });
  
  // Initialize theme
  const initialTheme = getCurrentTheme();
  applyTheme(initialTheme);
  
  // Keyboard navigation
  toggleBtn.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      dropdown.classList.add('show');
      toggleBtn.setAttribute('aria-expanded', 'true');
      options[0].focus();
    }
  });
  
  dropdown.addEventListener('keydown', function(e) {
    const focusableOptions = Array.from(options).filter(o => o.style.display !== 'none');
    const currentIndex = focusableOptions.indexOf(document.activeElement);
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const nextIndex = (currentIndex + 1) % focusableOptions.length;
      focusableOptions[nextIndex].focus();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prevIndex = (currentIndex - 1 + focusableOptions.length) % focusableOptions.length;
      focusableOptions[prevIndex].focus();
    } else if (e.key === 'Escape') {
      dropdown.classList.remove('show');
      toggleBtn.setAttribute('aria-expanded', 'false');
      toggleBtn.focus();
    }
  });
});
</script>
