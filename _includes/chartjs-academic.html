<!-- Chart.js Integration for Academic Data Visualization -->
<!-- Interactive charts for academic portfolio with responsive design -->

<!-- Chart.js Core -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Chart.js Plugins -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<!-- Custom Chart Configuration and Styles -->
<script>
// Global Chart.js configuration
Chart.defaults.font.family = 'Inter, system-ui, sans-serif';
Chart.defaults.color = getComputedStyle(document.documentElement).getPropertyValue('--color-gray-700').trim();
Chart.defaults.borderColor = getComputedStyle(document.documentElement).getPropertyValue('--color-gray-200').trim();
Chart.defaults.plugins.tooltip.backgroundColor = getComputedStyle(document.documentElement).getPropertyValue('--color-gray-800').trim();
Chart.defaults.plugins.tooltip.titleFont.size = 14;
Chart.defaults.plugins.tooltip.bodyFont.size = 12;
Chart.defaults.plugins.tooltip.padding = 12;
Chart.defaults.plugins.tooltip.cornerRadius = 8;
Chart.defaults.plugins.tooltip.boxPadding = 6;

// Dark mode support
function updateChartColors() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  Chart.defaults.color = isDark ? 
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-300').trim() :
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-700').trim();
  Chart.defaults.borderColor = isDark ?
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-600').trim() :
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-200').trim();
  Chart.defaults.plugins.tooltip.backgroundColor = isDark ?
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-900').trim() :
    getComputedStyle(document.documentElement).getPropertyValue('--color-gray-800').trim();
}

// Initialize color scheme detection
updateChartColors();
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateChartColors);

// Academic color palette
const academicColors = [
  '#E6E6FA', // Digital Lavender
  '#1a365d', // Deep Blue
  '#2d6a4f', // Organic Green
  '#f77f00', // Warm Orange
  '#d62828', // Deep Red
  '#2c5282', // Secondary Blue
  '#40916c', // Light Green
  '#fcbf49', // Light Orange
];

// Chart creation helper with common options
function createAcademicChart(ctx, config) {
  const defaultOptions = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'top',
        labels: {
          usePointStyle: true,
          padding: 20,
          font: {
            size: 12,
            weight: '500'
          }
        }
      },
      tooltip: {
        mode: 'index',
        intersect: false,
        backgroundColor: 'rgba(0, 0, 0, 0.8)',
        titleColor: '#fff',
        bodyColor: '#fff',
        borderColor: '#fff',
        borderWidth: 1,
        cornerRadius: 8,
        padding: 12,
        displayColors: true,
        callbacks: {
          label: function(context) {
            let label = context.dataset.label || '';
            if (label) {
              label += ': ';
            }
            if (context.parsed.y !== null) {
              label += context.parsed.y.toLocaleString();
            }
            return label;
          }
        }
      }
    },
    interaction: {
      mode: 'nearest',
      axis: 'x',
      intersect: false
    },
    animation: {
      duration: 750,
      easing: 'easeInOutQuart'
    }
  };

  return new Chart(ctx, {
    ...config,
    options: { ...defaultOptions, ...config.options }
  });
}

// Initialize charts when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
  // Auto-initialize charts with data-chart attributes
  const chartElements = document.querySelectorAll('[data-chart]');
  
  chartElements.forEach(element => {
    const chartType = element.dataset.chart;
    const chartData = JSON.parse(element.dataset.chartData || '{}');
    const chartOptions = JSON.parse(element.dataset.chartOptions || '{}');
    
    const ctx = element.getContext('2d');
    
    switch(chartType) {
      case 'courseProgress':
        createCourseProgressChart(ctx, chartData, chartOptions);
        break;
      case 'skillRadar':
        createSkillRadarChart(ctx, chartData, chartOptions);
        break;
      case 'timeline':
        createTimelineChart(ctx, chartData, chartOptions);
        break;
      case 'distribution':
        createDistributionChart(ctx, chartData, chartOptions);
        break;
      default:
        createAcademicChart(ctx, {
          type: chartType,
          data: chartData,
          options: chartOptions
        });
    }
  });
});

// Specialized chart creators for academic use cases
function createCourseProgressChart(ctx, data, options) {
  const config = {
    type: 'bar',
    data: {
      ...data,
      datasets: data.datasets.map((dataset, index) => ({
        ...dataset,
        backgroundColor: academicColors[index % academicColors.length],
        borderColor: academicColors[index % academicColors.length],
        borderWidth: 0,
        borderRadius: 8,
        barPercentage: 0.7
      }))
    },
    options: {
      ...options,
      plugins: {
        ...options.plugins,
        datalabels: {
          anchor: 'end',
          align: 'top',
          formatter: (value) => value + '%',
          font: {
            weight: 'bold',
            size: 11
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
          ticks: {
            callback: function(value) {
              return value + '%';
            }
          },
          grid: {
            borderDash: [5, 5],
            color: 'rgba(0, 0, 0, 0.1)'
          }
        },
        x: {
          grid: {
            display: false
          }
        }
      }
    }
  };
  
  return createAcademicChart(ctx, config);
}

function createSkillRadarChart(ctx, data, options) {
  const config = {
    type: 'radar',
    data: {
      ...data,
      datasets: data.datasets.map((dataset, index) => ({
        ...dataset,
        backgroundColor: academicColors[index % academicColors.length] + '40',
        borderColor: academicColors[index % academicColors.length],
        borderWidth: 2,
        pointBackgroundColor: academicColors[index % academicColors.length],
        pointBorderColor: '#fff',
        pointHoverBackgroundColor: '#fff',
        pointHoverBorderColor: academicColors[index % academicColors.length],
        pointRadius: 4,
        pointHoverRadius: 6
      }))
    },
    options: {
      ...options,
      plugins: {
        ...options.plugins,
        legend: {
          position: 'bottom'
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          max: 100,
          ticks: {
            stepSize: 20,
            backdropColor: 'transparent'
          },
          grid: {
            color: 'rgba(0, 0, 0, 0.1)'
          },
          pointLabels: {
            font: {
              size: 12,
              weight: '500'
            },
            color: getComputedStyle(document.documentElement).getPropertyValue('--color-gray-700').trim()
          }
        }
      }
    }
  };
  
  return createAcademicChart(ctx, config);
}

function createTimelineChart(ctx, data, options) {
  const config = {
    type: 'line',
    data: {
      ...data,
      datasets: data.datasets.map((dataset, index) => ({
        ...dataset,
        backgroundColor: academicColors[index % academicColors.length] + '20',
        borderColor: academicColors[index % academicColors.length],
        borderWidth: 3,
        tension: 0.4,
        fill: true,
        pointBackgroundColor: academicColors[index % academicColors.length],
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7
      }))
    },
    options: {
      ...options,
      scales: {
        y: {
          beginAtZero: true,
          grid: {
            borderDash: [5, 5],
            color: 'rgba(0, 0, 0, 0.1)'
          }
        },
        x: {
          grid: {
            display: false
          }
        }
      }
    }
  };
  
  return createAcademicChart(ctx, config);
}

function createDistributionChart(ctx, data, options) {
  const config = {
    type: 'doughnut',
    data: {
      ...data,
      datasets: data.datasets.map((dataset, index) => ({
        ...dataset,
        backgroundColor: academicColors.slice(0, dataset.data.length),
        borderColor: '#fff',
        borderWidth: 2,
        hoverOffset: 8
      }))
    },
    options: {
      ...options,
      plugins: {
        ...options.plugins,
        legend: {
          position: 'right',
          labels: {
            padding: 20,
            generateLabels: function(chart) {
              const data = chart.data;
              const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
              
              return data.labels.map((label, i) => ({
                text: `${label}: ${((data.datasets[0].data[i] / total) * 100).toFixed(1)}%`,
                fillStyle: data.datasets[0].backgroundColor[i],
                strokeStyle: data.datasets[0].borderColor,
                lineWidth: data.datasets[0].borderWidth,
                hidden: false,
                index: i
              }));
            }
          }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              const label = context.label || '';
              const value = context.parsed;
              const total = context.dataset.data.reduce((a, b) => a + b, 0);
              const percentage = ((value / total) * 100).toFixed(1);
              return `${label}: ${value} (${percentage}%)`;
            }
          }
        }
      }
    }
  };
  
  return createAcademicChart(ctx, config);
}
</script>

<style>
  /* Chart container styling */
  .chart-container {
    position: relative;
    margin: var(--space-6) 0;
    background: var(--color-white);
    border: 1px solid var(--color-gray-200);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    box-shadow: var(--shadow-md);
  }
  
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-4);
  }
  
  .chart-title {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    color: var(--color-gray-800);
  }
  
  .chart-actions {
    display: flex;
    gap: var(--space-2);
  }
  
  .chart-action-btn {
    background: var(--color-gray-100);
    border: 1px solid var(--color-gray-200);
    color: var(--color-gray-600);
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    font-size: var(--font-size-xs);
    cursor: pointer;
    transition: var(--transition-all) var(--transition-normal);
  }
  
  .chart-action-btn:hover {
    background: var(--color-primary);
    color: var(--color-white);
    border-color: var(--color-primary);
  }
  
  .chart-canvas {
    max-height: 400px;
    width: 100%;
  }
  
  .chart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: var(--space-6);
    margin: var(--space-6) 0;
  }
  
  .chart-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    color: var(--color-gray-400);
  }
  
  .chart-loading::before {
    content: '';
    width: 40px;
    height: 40px;
    border: 3px solid var(--color-gray-200);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: var(--space-3);
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  /* Responsive charts */
  @media (max-width: 768px) {
    .chart-container {
      padding: var(--space-4);
      margin: var(--space-4) 0;
    }
    
    .chart-header {
      flex-direction: column;
      align-items: flex-start;
      gap: var(--space-2);
    }
    
    .chart-grid {
      grid-template-columns: 1fr;
    }
    
    .chart-canvas {
      max-height: 300px;
    }
  }
  
  /* Dark mode support */
  @media (prefers-color-scheme: dark) {
    .chart-container {
      background: var(--color-gray-900);
      border-color: var(--color-gray-700);
    }
    
    .chart-title {
      color: var(--color-gray-200);
    }
    
    .chart-action-btn {
      background: var(--color-gray-800);
      border-color: var(--color-gray-600);
      color: var(--color-gray-300);
    }
    
    .chart-action-btn:hover {
      background: var(--color-primary);
      color: var(--color-gray-900);
    }
  }
  
  /* Print styles */
  @media print {
    .chart-container {
      background: white;
      border: 1px solid #ccc;
      box-shadow: none;
      page-break-inside: avoid;
    }
    
    .chart-actions {
      display: none;
    }
  }
</style>
