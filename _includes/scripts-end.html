<!-- KaTeX auto-render: catches $...$, \(...\), \[...\] not handled by kramdown's $$ -->
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="renderMathInElement(document.body, { delimiters: [
    {left: '$$', right: '$$', display: true},
    {left: '\\[', right: '\\]', display: true},
    {left: '$', right: '$', display: false},
    {left: '\\(', right: '\\)', display: false}
  ], throwOnError: false });"></script>

<!-- Prism syntax highlighting (autoloads any language Rouge missed) -->
<script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

<!-- Mermaid diagrams (only initialize if .mermaid blocks exist) -->
<script type="module">
  if (document.querySelector('.mermaid, pre.language-mermaid, code.language-mermaid')) {
    const m = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    m.default.initialize({
      startOnLoad: true,
      theme: dark ? 'dark' : 'neutral',
      fontFamily: "'Inter', system-ui, sans-serif"
    });
    // Convert ```mermaid fenced code blocks into div.mermaid for rendering
    document.querySelectorAll('pre > code.language-mermaid').forEach(el => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      el.parentElement.replaceWith(div);
    });
    m.default.run({ querySelector: '.mermaid' });
  }
</script>

<!-- Site behavior: mobile nav toggle -->
<script>
  (function() {
    const btn = document.querySelector('[data-nav-toggle]');
    const nav = document.querySelector('[data-mobile-nav]');
    if (!btn || !nav) return;
    btn.addEventListener('click', () => {
      const open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
