  <!-- KaTeX JS (defer): must appear before the init snippet; version matches kramdown-math-katex / katex gem -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/katex.min.js" integrity="sha384-G0zcxDFp5LWZtDuRMnBkk3EphCK1lhEf4UEyEM693ka574TZGwo4IWwS6QLzM/2t" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.7/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous"></script>
  <script>
    (function () {
      // Kramdown + kramdown-math-katex render $$…$$ (block) and $$…$$ inline at build time.
      // Single-dollar $…$ is left as plain text in HTML; auto-render handles it here (and \\(, \\), \\[, \\]).
      var katexOpts = {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\[", right: "\\]", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false }
        ],
        throwOnError: false,
        strict: false,
        ignoredTags: ["script", "noscript", "style", "textarea", "pre", "code", "option", "math", "annotation", "svg"],
        ignoredClasses: ["katex", "katex-display", "katex-html", "katex-mathml"]
      };

      function renderMathInBody() {
        if (typeof renderMathInElement !== "function") return;
        renderMathInElement(document.body, katexOpts);
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderMathInBody);
      } else {
        renderMathInBody();
      }
      window.addEventListener("load", renderMathInBody);
    })();
  </script>
