<svg class="lab-visual lab-visual--spectrum" viewBox="0 0 360 220" role="img" aria-label="Animated frequency spectrum decomposition">
  <defs>
    <linearGradient id="labSpectrumFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="labSpectrumLine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <g class="lab-visual__grid">
    <line x1="0" y1="40"  x2="360" y2="40"/>
    <line x1="0" y1="90"  x2="360" y2="90"/>
    <line x1="0" y1="140" x2="360" y2="140"/>
    <line x1="0" y1="190" x2="360" y2="190"/>
  </g>

  <path class="lab-visual__area"
        d="M0,200 L0,140 L18,118 L36,128 L54,96 L72,108 L90,72 L108,96 L126,52 L144,84 L162,46 L180,82 L198,40 L216,80 L234,32 L252,84 L270,52 L288,98 L306,68 L324,108 L342,80 L360,96 L360,220 L0,220 Z"
        fill="url(#labSpectrumFill)"/>

  <path class="lab-visual__line"
        d="M0,140 L18,118 L36,128 L54,96 L72,108 L90,72 L108,96 L126,52 L144,84 L162,46 L180,82 L198,40 L216,80 L234,32 L252,84 L270,52 L288,98 L306,68 L324,108 L342,80 L360,96"
        fill="none"
        stroke="url(#labSpectrumLine)"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <g class="lab-visual__markers">
    <circle cx="234" cy="32"  r="3.5"/>
    <text x="244" y="28">peak · 32 dB</text>
    <circle cx="126" cy="52"  r="2.5" class="lab-visual__marker--quiet"/>
    <text x="136" y="48" class="lab-visual__marker--quiet">harmonic</text>
  </g>
</svg>
