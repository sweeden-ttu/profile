<svg class="lab-visual lab-visual--sparkline" viewBox="0 0 360 220" role="img" aria-label="Citation count over time">
  <defs>
    <linearGradient id="labSparkFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g class="lab-visual__grid">
    <line x1="0"   y1="50"  x2="360" y2="50"/>
    <line x1="0"   y1="100" x2="360" y2="100"/>
    <line x1="0"   y1="150" x2="360" y2="150"/>
  </g>

  <path class="lab-visual__area"
        d="M0,180 L20,176 L60,170 L100,160 L140,148 L180,128 L220,104 L260,76 L300,52 L340,30 L360,22 L360,220 L0,220 Z"
        fill="url(#labSparkFill)"/>

  <path class="lab-visual__line"
        d="M0,180 L20,176 L60,170 L100,160 L140,148 L180,128 L220,104 L260,76 L300,52 L340,30 L360,22"
        fill="none" stroke="#8b5cf6" stroke-width="2.25"
        stroke-linecap="round" stroke-linejoin="round"/>

  <g class="lab-visual__ticks">
    <text x="0"   y="208">2020</text>
    <text x="90"  y="208">2022</text>
    <text x="180" y="208">2024</text>
    <text x="270" y="208">2025</text>
    <text x="340" y="208">2026</text>
  </g>

  <g class="lab-visual__pin">
    <circle cx="340" cy="30" r="5"/>
    <text x="320" y="14">1,247</text>
  </g>
</svg>
