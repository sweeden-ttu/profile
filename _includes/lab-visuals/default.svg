<svg class="lab-visual lab-visual--default" viewBox="0 0 320 220" role="img" aria-label="Lab signature mark">
  <defs>
    <linearGradient id="labDefaultGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="lab-visual__default-frame" x="20" y="20" width="280" height="180" rx="8" fill="url(#labDefaultGrad)"/>

  <g class="lab-visual__default-grid">
    <line x1="20"  y1="60"  x2="300" y2="60"/>
    <line x1="20"  y1="110" x2="300" y2="110"/>
    <line x1="20"  y1="160" x2="300" y2="160"/>
    <line x1="90"  y1="20"  x2="90"  y2="200"/>
    <line x1="160" y1="20"  x2="160" y2="200"/>
    <line x1="230" y1="20"  x2="230" y2="200"/>
  </g>

  <text x="160" y="118" text-anchor="middle" class="lab-visual__default-mark">ETR</text>
</svg>
