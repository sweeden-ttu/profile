<svg class="lab-visual lab-visual--orbit" viewBox="0 0 320 220" role="img" aria-label="Five research domains orbiting a shared scaffold">
  <defs>
    <radialGradient id="labOrbitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="110" r="90" fill="url(#labOrbitGlow)"/>

  <g class="lab-visual__grid lab-visual__grid--orbit">
    <ellipse cx="160" cy="110" rx="92" ry="92"/>
    <ellipse cx="160" cy="110" rx="68" ry="68"/>
    <ellipse cx="160" cy="110" rx="44" ry="44"/>
  </g>

  <g class="lab-visual__nodes">
    <g transform="translate(160,18)">
      <circle r="6"/>
      <text y="-12">RL</text>
    </g>
    <g transform="translate(247,73)">
      <circle r="6" class="lab-visual__node--alt"/>
      <text x="12" y="4">Comp Bio</text>
    </g>
    <g transform="translate(231,170)">
      <circle r="6"/>
      <text x="12" y="4">Quantum</text>
    </g>
    <g transform="translate(89,170)">
      <circle r="6" class="lab-visual__node--alt"/>
      <text x="-72" y="4">Crypto</text>
    </g>
    <g transform="translate(73,73)">
      <circle r="6"/>
      <text x="-94" y="4">Robustness</text>
    </g>
    <g transform="translate(160,110)">
      <circle r="9" class="lab-visual__node--hub"/>
    </g>
  </g>

  <g class="lab-visual__edges">
    <line x1="160" y1="110" x2="160" y2="18"/>
    <line x1="160" y1="110" x2="247" y2="73"/>
    <line x1="160" y1="110" x2="231" y2="170"/>
    <line x1="160" y1="110" x2="89"  y2="170"/>
    <line x1="160" y1="110" x2="73"  y2="73"/>
  </g>
</svg>
