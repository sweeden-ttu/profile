<svg class="lab-visual lab-visual--cluster" viewBox="0 0 360 220" role="img" aria-label="Reproducible compute cluster topology">
  <g class="lab-visual__cluster-frame">
    <rect x="14" y="14" width="332" height="192" rx="6" ry="6" fill="none"/>
  </g>

  <g class="lab-visual__cluster-nodes">
    <g transform="translate(40,40)">
      <rect width="68" height="44" rx="4"/>
      <text x="34" y="26">aurora-n7</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">8x H100</text>
    </g>
    <g transform="translate(146,40)">
      <rect width="68" height="44" rx="4" class="lab-visual__cluster-node--alt"/>
      <text x="34" y="26">archive-α</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">612 TB</text>
    </g>
    <g transform="translate(252,40)">
      <rect width="68" height="44" rx="4"/>
      <text x="34" y="26">runner-β</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">CI · 24/7</text>
    </g>

    <g transform="translate(40,116)">
      <rect width="68" height="44" rx="4"/>
      <text x="34" y="26">pin-vault</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">SHA-256</text>
    </g>
    <g transform="translate(146,116)">
      <rect width="68" height="44" rx="4" class="lab-visual__cluster-node--accent"/>
      <text x="34" y="26">scheduler</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">Slurm 24.05</text>
    </g>
    <g transform="translate(252,116)">
      <rect width="68" height="44" rx="4"/>
      <text x="34" y="26">peer-mirror</text>
      <text x="34" y="40" class="lab-visual__cluster-meta">3 replicas</text>
    </g>
  </g>

  <g class="lab-visual__cluster-edges">
    <line x1="180" y1="84"  x2="180" y2="116"/>
    <line x1="74"  y1="84"  x2="180" y2="116"/>
    <line x1="286" y1="84"  x2="180" y2="116"/>
    <line x1="74"  y1="160" x2="180" y2="160"/>
    <line x1="286" y1="160" x2="180" y2="160"/>
  </g>

  <g class="lab-visual__cluster-pulse">
    <circle cx="180" cy="138" r="6"/>
  </g>
</svg>
