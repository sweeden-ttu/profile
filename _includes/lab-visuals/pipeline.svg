<svg class="lab-visual lab-visual--pipeline" viewBox="0 0 360 220" role="img" aria-label="Collaboration intake pipeline">
  <defs>
    <linearGradient id="labPipelineFlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <g class="lab-visual__pipeline-stations">
    <g transform="translate(20,90)">
      <circle r="22" cx="22" cy="22"/>
      <text x="22" y="26">01</text>
      <text x="22" y="74" class="lab-visual__pipeline-lbl">Inquiry</text>
    </g>
    <g transform="translate(120,90)">
      <circle r="22" cx="22" cy="22"/>
      <text x="22" y="26">02</text>
      <text x="22" y="74" class="lab-visual__pipeline-lbl">Scoping</text>
    </g>
    <g transform="translate(220,90)">
      <circle r="22" cx="22" cy="22"/>
      <text x="22" y="26">03</text>
      <text x="22" y="74" class="lab-visual__pipeline-lbl">Review</text>
    </g>
    <g transform="translate(320,90)">
      <circle r="22" cx="22" cy="22" class="lab-visual__pipeline-final"/>
      <text x="22" y="26">04</text>
      <text x="22" y="74" class="lab-visual__pipeline-lbl">Kickoff</text>
    </g>
  </g>

  <path class="lab-visual__pipeline-flow"
        d="M64,112 L142,112 M186,112 L242,112 M286,112 L342,112"
        stroke="url(#labPipelineFlow)" fill="none"
        stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 6"/>

  <g class="lab-visual__pipeline-callout">
    <text x="22"  y="26">3 / sem.</text>
    <text x="180" y="34" class="lab-visual__pipeline-callout-lbl">14-day SLA</text>
  </g>
</svg>
