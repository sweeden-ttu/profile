<section class="projects-hub__portfolio work-gallery" data-work-gallery aria-label="PDF portfolio deck">
  <header class="projects-hub__portfolio-head" data-reveal>
    <p class="etr-eyebrow">
      <span class="etr-eyebrow__dot" aria-hidden="true"></span>
      Coursework archive
    </p>
    <h2 class="projects-hub__section-title" id="projects-pdf-heading">PDF portfolio</h2>
    <p class="work-gallery__lede">
      Browsable PDFs from <code class="work-gallery__code">data/</code>, grouped by topic. Use the deck controls or keyboard arrows; click a thumbnail to jump or open the PDF.
    </p>
  </header>

  <section class="work-gallery__deck-wrap" aria-labelledby="work-gallery-deck-heading">
    <h2 id="work-gallery-deck-heading" class="visually-hidden">Slide deck</h2>
    <div class="work-gallery__deck" data-deck>
      <div class="work-gallery__slides" data-slides></div>
      <div class="work-gallery__empty" data-deck-empty hidden>
        <p>No portfolio data found. Run <kbd class="work-gallery__kbd">python3 scripts/generate_work_portfolio.py</kbd> from the repository root.</p>
      </div>
    </div>
    <div class="work-gallery__deck-meta" aria-live="polite" data-deck-live></div>
    <div class="work-gallery__controls">
      <button type="button" class="work-gallery__btn work-gallery__btn--ghost" data-action="prev" aria-label="Previous slide">
        <span aria-hidden="true">←</span> Previous
      </button>
      <button type="button" class="work-gallery__btn work-gallery__btn--primary" data-action="next" aria-label="Next slide">
        Next <span aria-hidden="true">→</span>
      </button>
      <a class="work-gallery__btn work-gallery__btn--link" data-open-pdf href="#" target="_blank" rel="noopener">Open PDF</a>
    </div>
  </section>

  <section class="work-gallery__topics" aria-labelledby="work-gallery-topics-heading">
    <h2 id="work-gallery-topics-heading" class="work-gallery__section-title">By topic</h2>
    <div class="work-gallery__topics-inner" data-topic-regions></div>
  </section>

  <script type="application/json" id="work-portfolio-json">{% if site.data.work_portfolio %}{{ site.data.work_portfolio | jsonify }}{% else %}{"topics":[]}{% endif %}</script>
</section>

<script src="{{ '/assets/js/work-gallery.js' | relative_url }}" defer></script>
