<!-- Custom Prism Configuration -->
<script>
// Configure Prism for enhanced performance and features
window.Prism = window.Prism || {};
Prism.manual = false; // Auto-highlight on page load
Prism.highlightAll = function() {
  Prism.highlightAllUnder(document);
};

// Enhanced copy to clipboard configuration
Prism.plugins.copyToClipboard = {
  success: function() {
    showCopyFeedback('Copied!', 'success');
  },
  error: function() {
    showCopyFeedback('Copy failed', 'error');
  }
};

// Show feedback for copy action
function showCopyFeedback(message, type) {
  const feedback = document.createElement('div');
  feedback.className = `prism-copy-feedback prism-copy-feedback--${type}`;
  feedback.textContent = message;
  document.body.appendChild(feedback);
  
  setTimeout(() => {
    feedback.classList.add('show');
  }, 10);
  
  setTimeout(() => {
    feedback.classList.remove('show');
    setTimeout(() => {
      document.body.removeChild(feedback);
    }, 300);
  }, 2000);
}

// Initialize Prism with custom settings
document.addEventListener('DOMContentLoaded', function() {
  // Configure line numbers for long code blocks
  const codeBlocks = document.querySelectorAll('pre code');
  codeBlocks.forEach(block => {
    const lines = block.textContent.split('\n').length;
    if (lines > 5) {
      block.parentElement.classList.add('line-numbers', 'prism-show-language');
    } else {
      block.parentElement.classList.add('prism-show-language');
    }
  });
  
  // Add copy buttons to all code blocks
  Prism.highlightAll();
});

// Keyboard shortcut for copying current code block
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    const selection = window.getSelection();
    if (selection.rangeCount === 0) return;
    
    const selectedElement = selection.anchorNode.parentElement;
    const codeBlock = selectedElement.closest('pre code');
    
    if (codeBlock) {
      e.preventDefault();
      navigator.clipboard.writeText(codeBlock.textContent).then(() => {
        showCopyFeedback('Code copied!', 'success');
      }).catch(() => {
        showCopyFeedback('Copy failed', 'error');
      });
    }
  }
});
</script>
